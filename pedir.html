<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Entre Amigos · Pedir a domicilio 🛵</title>
<meta name="theme-color" content="#0d47a1">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<style>
:root{
  --azul:#1565c0;--azul-osc:#0d47a1;--amarillo:#ffd400;--rojo:#e53935;
  --verde:#2e7d32;--gris:#f4f6f9;--gris-2:#e8edf2;--texto:#1a2230;--suave:#6b7a90;
  --borde:#dfe6ee;--sombra:0 4px 18px rgba(13,71,161,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--gris);color:var(--texto);font-size:15px;padding-bottom:90px}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;font-size:15px}
.topbar{position:sticky;top:0;z-index:30;background:var(--azul-osc);color:#fff;display:flex;align-items:center;gap:12px;padding:10px 16px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar img{width:44px;height:44px;border-radius:50%;border:2px solid var(--amarillo);object-fit:cover}
.topbar b{font-size:16px;font-weight:900;letter-spacing:.5px;display:block}
.topbar span{font-size:11px;opacity:.9}
.wrap{max-width:760px;margin:0 auto;padding:14px}
.banner{background:linear-gradient(145deg,#1976d2,#0d47a1);color:#fff;border-radius:16px;padding:16px;text-align:center;margin-bottom:14px}
.banner h1{font-size:20px;font-weight:900;color:var(--amarillo)}
.banner p{font-size:13px;opacity:.95;margin-top:4px}
.cat-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.cat-chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:8px 15px;border-radius:20px;background:#fff;border:2px solid var(--borde);font-size:13px;font-weight:700;color:var(--suave)}
.chip.active{background:var(--amarillo);border-color:var(--amarillo);color:var(--azul-osc)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.card{background:#fff;border-radius:14px;padding:12px;box-shadow:var(--sombra);text-align:center;border:2px solid transparent}
.card.off{opacity:.45}
.card .em{font-size:32px}
.card .n{font-size:14px;font-weight:800;line-height:1.2;min-height:34px;display:flex;align-items:center;justify-content:center;margin-top:4px}
.card .p{color:var(--verde);font-weight:900;font-size:16px;margin-top:2px}
.card .c{font-size:10px;color:var(--suave);margin-top:2px}
.card button{margin-top:8px;width:100%;background:var(--azul);color:#fff;padding:9px;border-radius:10px;font-weight:800;font-size:13px}
.card button:active{transform:scale(.97)}
.card.off button{background:var(--gris-2);color:var(--suave)}
/* barra carrito flotante */
.cartbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--azul-osc);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.cartbar .info{flex:1}
.cartbar .info b{font-size:18px;font-weight:900}
.cartbar .info span{font-size:12px;opacity:.9;display:block}
.cartbar button{background:var(--amarillo);color:var(--azul-osc);font-weight:900;padding:12px 18px;border-radius:12px;font-size:15px}
.cartbar.hidden{display:none}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(13,30,60,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:760px;max-height:92vh;overflow-y:auto;padding:18px}
@media(min-width:600px){.modal-bg{align-items:center}.modal{border-radius:20px}}
.modal h3{font-size:18px;font-weight:900;color:var(--azul-osc);margin-bottom:12px}
.citem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gris-2)}
.citem .ci{flex:1}.citem .ci b{font-size:14px;display:block}.citem .ci span{font-size:12px;color:var(--suave)}
.qty{display:flex;align-items:center;gap:8px}
.qty button{width:30px;height:30px;border-radius:8px;background:var(--gris-2);font-weight:900;font-size:18px;color:var(--azul-osc)}
.qty span{min-width:22px;text-align:center;font-weight:800}
.sub{font-weight:900;color:var(--verde);min-width:64px;text-align:right;font-size:13px}
.total{display:flex;justify-content:space-between;font-size:24px;font-weight:900;color:var(--azul-osc);margin:14px 0}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--suave);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea{width:100%;padding:12px 14px;border:2px solid var(--borde);border-radius:12px;background:#fbfcfe}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;font-weight:900;font-size:16px}
.btn-wa{background:#25D366;color:#fff}
.btn-g{background:var(--gris-2);color:var(--texto);font-size:14px;padding:11px}
.pres-btn{display:flex;justify-content:space-between;align-items:center;width:100%;background:var(--amarillo);color:var(--azul-osc);padding:13px 16px;border-radius:12px;font-weight:800;margin-bottom:8px}
.loading{text-align:center;padding:50px 20px;color:var(--suave)}
.spin{width:40px;height:40px;border:4px solid var(--gris-2);border-top-color:var(--azul);border-radius:50%;margin:0 auto 14px;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--azul-osc);color:#fff;padding:11px 20px;border-radius:30px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.3s;z-index:300}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="topbar">
  <img src="assets/logo.png" alt="Entre Amigos">
  <div><b>ENTRE AMIGOS</b><span>🛵 Pedidos a domicilio · 312 777 4605</span></div>
</div>

<div class="wrap">
  <div class="banner">
    <h1>🍺 Pide a domicilio</h1>
    <p>Elige tus productos, arma tu pedido y te decimos el valor y el tiempo de entrega.</p>
  </div>
  <div class="cat-chips" id="cats"></div>
  <div id="grid"><div class="loading"><div class="spin"></div>Cargando productos...</div></div>
</div>

<div class="cartbar hidden" id="cartbar">
  <div class="info"><b id="cbTotal">$0</b><span id="cbCount">0 productos</span></div>
  <button onclick="openCart()">Ver pedido 🛒</button>
</div>

<div id="modalHost"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL='https://vslaiticcxwcikapwjis.supabase.co';
const SUPA_KEY='sb_publishable_6UedTQBt2V92i_hp-G2AlQ_FY-H3PKO';
const TIENDA_WA='573127774605'; // celular principal de la tienda
const money=n=>'$'+Math.round(n).toLocaleString('es-CO');
let PRODUCTOS=[], CAT='Todos', CART=[];

function presList(p){return p.presentaciones&&p.presentaciones.length?p.presentaciones:[{nombre:'Unidad',factor:1,precioVenta:p.precioVenta||0}]}
function picon(p){return p&&p.img?`<img src="${p.img}" style="width:40px;height:40px;object-fit:contain;border-radius:8px" onerror="this.replaceWith(document.createTextNode('📦'))">`:((p&&p.emoji)||'📦')}
function piconSm(p){return p&&p.img?`<img src="${p.img}" style="width:20px;height:20px;object-fit:contain;border-radius:4px;vertical-align:middle" onerror="this.replaceWith(document.createTextNode('📦'))">`:((p&&p.emoji)||'')}

async function init(){
  try{
    const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
    const {data,error}=await sb.from('tienda_data').select('data').eq('id',1).maybeSingle();
    if(error)throw error;
    PRODUCTOS=(data&&data.data&&data.data.productos)?data.data.productos:[];
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="loading">No pudimos cargar el catálogo.<br>Escríbenos directo a <b>312 777 4605</b> 🍺</div>';
    return;
  }
  renderCats();renderGrid();
}
function renderCats(){
  const cats=['Todos',...new Set(PRODUCTOS.map(p=>p.categoria))];
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="chip ${CAT===c?'active':''}" onclick="CAT='${c}';renderCats();renderGrid()">${c}</button>`).join('');
}
function renderGrid(){
  let list=PRODUCTOS.filter(p=>CAT==='Todos'||p.categoria===CAT);
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="loading">No hay productos en esta categoría.</div>';return}
  g.innerHTML='<div class="grid">'+list.map((p,i)=>{
    const idx=PRODUCTOS.indexOf(p);const pres=presList(p);const multi=pres.length>1;const off=p.stock<=0;
    return `<div class="card ${off?'off':''}">
      <div class="em">${picon(p)}</div>
      <div class="n">${p.nombre}</div>
      <div class="p">${money(pres[0].precioVenta)}${multi?' +':''}</div>
      <div class="c">${off?'Agotado':p.categoria}</div>
      <button ${off?'disabled':''} onclick="tap(${idx})">${off?'Sin stock':'Agregar +'}</button>
    </div>`}).join('')+'</div>';
}
function tap(idx){
  const p=PRODUCTOS[idx];const pres=presList(p);
  if(pres.length<=1){add(idx,0);return}
  modal(`<h3>${p.emoji||''} ${p.nombre}</h3><p style="color:var(--suave);font-size:13px;margin-bottom:14px">¿Cuál quieres pedir?</p>
    ${pres.map((pr,i)=>`<button class="pres-btn" onclick="add(${idx},${i});closeModal()"><span>${pr.nombre}${pr.factor>1?` · ${pr.factor} und`:''}</span><b>${money(pr.precioVenta)}</b></button>`).join('')}
    <button class="btn btn-g" onclick="closeModal()" style="margin-top:6px">Cancelar</button>`);
}
function add(idx,pi){
  const p=PRODUCTOS[idx];const pr=presList(p)[pi];const key=idx+'|'+pi;
  const it=CART.find(c=>c.key===key);
  if(it)it.cant++;else CART.push({key,nombre:p.nombre,emoji:p.emoji,img:p.img,pres:pr.nombre,factor:pr.factor,precio:pr.precioVenta,cant:1});
  updBar();toast('Agregado al pedido 🛒');
}
function changeQ(key,d){const it=CART.find(c=>c.key===key);if(!it)return;it.cant+=d;if(it.cant<=0)CART=CART.filter(c=>c.key!==key);updBar();renderCartItems();}
function total(){return CART.reduce((s,i)=>s+i.precio*i.cant,0)}
function count(){return CART.reduce((s,i)=>s+i.cant,0)}
function updBar(){
  const bar=document.getElementById('cartbar');
  if(!CART.length){bar.classList.add('hidden');return}
  bar.classList.remove('hidden');
  document.getElementById('cbTotal').textContent=money(total());
  document.getElementById('cbCount').textContent=count()+' producto(s)';
}
function openCart(){
  modal(`<h3>🛒 Tu pedido</h3><div id="cartItems"></div>
    <div class="total"><span>TOTAL</span><span id="ctTotal">${money(total())}</span></div>
    <p style="font-size:12px;color:var(--suave);margin-bottom:12px">📋 Completa tus datos para el domicilio:</p>
    <div class="field"><label>Tu nombre</label><input id="f_nombre" placeholder="Nombre y apellido"></div>
    <div class="field"><label>Dirección de entrega</label><input id="f_dir" placeholder="Calle, número, barrio"></div>
    <div class="field"><label>Tu teléfono</label><input id="f_tel" inputmode="numeric" placeholder="Tu celular"></div>
    <div class="field"><label>Nota (opcional)</label><textarea id="f_nota" rows="2" placeholder="Punto de referencia, hora, etc."></textarea></div>
    <button class="btn btn-wa" onclick="enviar()">📲 Enviar pedido por WhatsApp</button>
    <button class="btn btn-g" style="margin-top:8px" onclick="closeModal()">Seguir agregando</button>
    <p style="font-size:11px;color:var(--suave);text-align:center;margin-top:10px">Tu pedido llega a la tienda. Ellos confirman disponibilidad y tiempo de entrega 🙏</p>`);
  renderCartItems();
}
function renderCartItems(){
  const el=document.getElementById('cartItems');if(!el)return;
  if(!CART.length){el.innerHTML='<p style="color:var(--suave);text-align:center;padding:20px">Tu pedido está vacío</p>';const t=document.getElementById('ctTotal');if(t)t.textContent=money(0);updBar();return}
  el.innerHTML=CART.map(i=>`<div class="citem">
    <div class="ci"><b>${piconSm(i)} ${i.nombre}</b><span>${i.pres} · ${money(i.precio)}</span></div>
    <div class="qty"><button onclick="changeQ('${i.key}',-1)">−</button><span>${i.cant}</span><button onclick="changeQ('${i.key}',1)">+</button></div>
    <div class="sub">${money(i.precio*i.cant)}</div></div>`).join('');
  const t=document.getElementById('ctTotal');if(t)t.textContent=money(total());
}
function enviar(){
  if(!CART.length){toast('Tu pedido está vacío');return}
  const nombre=(document.getElementById('f_nombre').value||'').trim();
  const dir=(document.getElementById('f_dir').value||'').trim();
  const tel=(document.getElementById('f_tel').value||'').trim();
  const nota=(document.getElementById('f_nota').value||'').trim();
  if(!nombre||!dir||!tel){toast('Completa nombre, dirección y teléfono');return}
  let t=`🛵 *PEDIDO A DOMICILIO*\n*Entre Amigos* 🐵🍺\n\n`;
  t+=`👤 Cliente: ${nombre}\n📍 Dirección: ${dir}\n📱 Teléfono: ${tel}\n`;
  if(nota)t+=`📝 Nota: ${nota}\n`;
  t+=`\n🛒 *Pedido:*\n`;
  CART.forEach(i=>{t+=`• ${i.cant}× ${i.nombre}${i.factor>1?` (${i.pres})`:''} — ${money(i.precio*i.cant)}\n`});
  t+=`\n💰 *TOTAL A PAGAR: ${money(total())}*\n\n`;
  t+=`Por favor confírmenme el pedido y el tiempo de entrega 🙏`;
  window.open('https://wa.me/'+TIENDA_WA+'?text='+encodeURIComponent(t),'_blank');
}
function modal(html){document.getElementById('modalHost').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`}
function closeModal(){document.getElementById('modalHost').innerHTML=''}
let tT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(tT);tT=setTimeout(()=>t.className='',1800)}
init();
</script>
</body>
</html>
