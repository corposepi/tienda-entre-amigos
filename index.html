<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Entre Amigos · Sistema de Tienda</title>
<meta name="theme-color" content="#1565c0">
<style>
:root{
  --azul:#1565c0; --azul-osc:#0d47a1; --azul-claro:#42a5f5;
  --amarillo:#ffd400; --rojo:#e53935; --rojo-osc:#c62828;
  --verde:#2e7d32; --verde-claro:#43a047;
  --gris:#f4f6f9; --gris-2:#e8edf2; --texto:#1a2230; --suave:#6b7a90;
  --tarjeta:#ffffff; --borde:#dfe6ee;
  --sombra:0 4px 18px rgba(13,71,161,.10);
  --radio:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  background:var(--gris); color:var(--texto); font-size:15px;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select{font-family:inherit;font-size:15px}
.hidden{display:none!important}

/* ====== LOGIN ====== */
#login{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 20%, #1e88e5, var(--azul-osc));
  padding:20px;z-index:100;
}
.login-card{
  background:var(--tarjeta);width:100%;max-width:380px;border-radius:24px;
  padding:30px 26px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;
}
.logo-wrap{width:130px;height:130px;margin:0 auto 14px;border-radius:50%;
  background:linear-gradient(145deg,#1976d2,#0d47a1);display:flex;align-items:center;
  justify-content:center;box-shadow:0 8px 24px rgba(13,71,161,.5);overflow:hidden;
  border:4px solid var(--amarillo)}
.logo-wrap img{width:100%;height:100%;object-fit:cover}
.logo-fallback{font-weight:900;color:var(--amarillo);font-size:13px;line-height:1.1;
  text-shadow:1px 1px 0 #000;letter-spacing:.5px;padding:8px}
.logo-fallback .mono{font-size:40px;display:block;margin-bottom:2px}
h1.brand{font-size:22px;font-weight:900;color:var(--azul-osc);letter-spacing:.5px}
.brand-sub{font-size:12px;color:var(--rojo);font-weight:700;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--suave);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:13px 14px;border:2px solid var(--borde);border-radius:12px;background:#fbfcfe}
.field input:focus,.field select:focus{border-color:var(--azul-claro)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 18px;border-radius:12px;font-weight:800;font-size:15px;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--azul);color:#fff;width:100%}
.btn-primary:hover{background:var(--azul-osc)}
.btn-amarillo{background:var(--amarillo);color:var(--azul-osc)}
.btn-rojo{background:var(--rojo);color:#fff}
.btn-verde{background:var(--verde);color:#fff}
.btn-gris{background:var(--gris-2);color:var(--texto)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:9px}
.hint{font-size:11px;color:var(--suave);margin-top:14px;line-height:1.5}

/* ====== APP SHELL ====== */
#app{display:none;min-height:100vh;padding-bottom:80px}
.topbar{position:sticky;top:0;z-index:50;background:var(--azul-osc);color:#fff;
  display:flex;align-items:center;gap:12px;padding:10px 16px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar .tlogo{width:42px;height:42px;border-radius:50%;background:#1976d2;overflow:hidden;
  border:2px solid var(--amarillo);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.topbar .tlogo img{width:100%;height:100%;object-fit:cover}
.topbar .tlogo .tf{font-size:8px;font-weight:900;color:var(--amarillo);text-align:center;line-height:1}
.topbar .tinfo{flex:1;min-width:0}
.topbar .tinfo b{display:block;font-size:15px;font-weight:900;letter-spacing:.5px}
.topbar .tinfo span{font-size:11px;opacity:.85}
.rolepill{background:var(--amarillo);color:var(--azul-osc);font-size:10px;font-weight:900;
  padding:3px 9px;border-radius:20px;text-transform:uppercase}
.icon-btn{background:rgba(255,255,255,.15);color:#fff;width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px}

.container{max-width:1100px;margin:0 auto;padding:16px}

/* ====== NAV TABS ====== */
.tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;background:#fff;
  border-bottom:1px solid var(--borde);position:sticky;top:62px;z-index:40;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:9px 16px;border-radius:30px;background:var(--gris-2);
  color:var(--suave);font-weight:700;font-size:13px;border:2px solid transparent}
.tab.active{background:var(--azul);color:#fff;border-color:var(--azul-osc)}

/* ====== CARDS / GRID ====== */
.section-title{font-size:18px;font-weight:900;color:var(--azul-osc);margin:6px 0 14px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--tarjeta);border-radius:var(--radio);padding:16px;box-shadow:var(--sombra);border-left:5px solid var(--azul)}
.stat.v{border-color:var(--verde)} .stat.r{border-color:var(--rojo)} .stat.a{border-color:var(--amarillo)}
.stat .lbl{font-size:11px;color:var(--suave);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat .val{font-size:24px;font-weight:900;margin-top:4px;color:var(--texto)}
.stat .sub{font-size:11px;color:var(--suave);margin-top:2px}

.card{background:var(--tarjeta);border-radius:var(--radio);box-shadow:var(--sombra);padding:18px;margin-bottom:16px}
.card h3{font-size:15px;font-weight:800;color:var(--azul-osc);margin-bottom:12px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 8px;color:var(--suave);font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;border-bottom:2px solid var(--borde)}
td{padding:10px 8px;border-bottom:1px solid var(--gris-2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.ta-r{text-align:right}.ta-c{text-align:center}
.muted{color:var(--suave)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800}
.badge.ok{background:#e8f5e9;color:var(--verde)}
.badge.low{background:#fff3e0;color:#ef6c00}
.badge.out{background:#ffebee;color:var(--rojo)}
.badge.cat{background:#e3f2fd;color:var(--azul)}

/* ====== POS ====== */
.pos-wrap{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
@media(max-width:880px){.pos-wrap{grid-template-columns:1fr}}
.pos-search{display:flex;gap:8px;margin-bottom:12px}
.pos-search input{flex:1;padding:12px 14px;border:2px solid var(--borde);border-radius:12px}
.cat-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.cat-chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:7px 14px;border-radius:20px;background:#fff;border:2px solid var(--borde);
  font-size:13px;font-weight:700;color:var(--suave)}
.chip.active{background:var(--amarillo);border-color:var(--amarillo);color:var(--azul-osc)}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.prod-card{background:#fff;border-radius:14px;padding:12px;box-shadow:var(--sombra);text-align:center;
  border:2px solid transparent;transition:.12s;position:relative}
.prod-card:active{transform:scale(.96)}
.prod-card.disabled{opacity:.45;pointer-events:none}
.prod-emoji{font-size:30px;margin-bottom:4px}
.prod-card .pn{font-size:13px;font-weight:800;line-height:1.2;min-height:32px;display:flex;align-items:center;justify-content:center}
.prod-card .pp{color:var(--verde);font-weight:900;font-size:15px;margin-top:4px}
.prod-card .ps{font-size:10px;color:var(--suave);margin-top:2px}
.stock-tag{position:absolute;top:6px;right:6px;font-size:9px;background:var(--gris-2);color:var(--suave);
  padding:2px 6px;border-radius:10px;font-weight:800}

/* CART */
.cart{position:sticky;top:120px;background:#fff;border-radius:var(--radio);box-shadow:var(--sombra);overflow:hidden}
.cart-head{background:var(--azul-osc);color:#fff;padding:14px 16px;font-weight:900;display:flex;justify-content:space-between;align-items:center}
.cart-body{max-height:38vh;overflow-y:auto;padding:8px 0}
.cart-empty{text-align:center;color:var(--suave);padding:30px 16px;font-size:13px}
.cart-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--gris-2)}
.ci-del{background:transparent;font-size:15px;opacity:.6;padding:2px;flex-shrink:0}
.ci-del:active{opacity:1}
.cart-item .ci-info{flex:1;min-width:0}
.cart-item .ci-info b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item .ci-info span{font-size:11px;color:var(--suave)}
.qty{display:flex;align-items:center;gap:6px}
.qty button{width:26px;height:26px;border-radius:8px;background:var(--gris-2);font-weight:900;font-size:16px;color:var(--azul-osc)}
.qty span{min-width:20px;text-align:center;font-weight:800;font-size:14px}
.ci-sub{font-weight:900;font-size:13px;min-width:62px;text-align:right;color:var(--verde)}
.cart-foot{padding:14px 16px;border-top:2px solid var(--borde)}
.cart-total{display:flex;justify-content:space-between;font-size:22px;font-weight:900;color:var(--azul-osc);margin-bottom:12px}

/* PAGO */
.pay-box{background:var(--gris);border-radius:12px;padding:12px;margin-bottom:12px}
.pay-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pay-row label{font-size:12px;font-weight:700;color:var(--suave)}
.pay-input{width:140px;padding:10px;border:2px solid var(--borde);border-radius:10px;text-align:right;font-weight:900;font-size:16px}
.quickcash{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.quickcash button{flex:1;min-width:60px;padding:8px;border-radius:9px;background:#fff;border:2px solid var(--borde);font-weight:800;font-size:12px;color:var(--azul-osc)}
.vuelta-box{text-align:center;padding:12px;border-radius:12px;font-weight:900;margin-bottom:12px}
.vuelta-box.ok{background:#e8f5e9;color:var(--verde)}
.vuelta-box.falta{background:#ffebee;color:var(--rojo)}
.vuelta-box .big{font-size:26px;display:block;margin-top:2px}
.pay-method{display:flex;gap:8px;margin-bottom:12px}
.pay-method button{flex:1;padding:10px;border-radius:10px;background:var(--gris-2);font-weight:800;font-size:13px;color:var(--suave);border:2px solid transparent}
.pay-method button.active{background:var(--azul);color:#fff;border-color:var(--azul-osc)}

/* ====== CALCULADORA ====== */
.calc{max-width:320px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:var(--sombra);overflow:hidden}
.calc-screen{background:var(--azul-osc);color:#fff;padding:20px;text-align:right}
.calc-prev{font-size:14px;opacity:.6;min-height:18px;word-break:break-all}
.calc-cur{font-size:38px;font-weight:900;word-break:break-all}
.calc-keys{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--borde)}
.calc-keys button{padding:20px;background:#fff;font-size:20px;font-weight:800;border:none}
.calc-keys button:active{background:var(--gris-2)}
.calc-keys .op{background:var(--azul-claro);color:#fff}
.calc-keys .eq{background:var(--verde);color:#fff}
.calc-keys .clr{background:var(--rojo);color:#fff}
.calc-keys .span2{grid-column:span 2}

/* ====== MODAL ====== */
.modal-bg{position:fixed;inset:0;background:rgba(13,30,60,.6);display:flex;align-items:center;
  justify-content:center;padding:16px;z-index:200;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-size:18px;font-weight:900;color:var(--azul-osc);margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.modal-actions .btn{flex:1}

/* FAB */
.fab{position:fixed;right:18px;bottom:18px;width:58px;height:58px;border-radius:50%;background:var(--rojo);
  color:#fff;font-size:28px;box-shadow:0 8px 24px rgba(229,57,53,.5);display:flex;align-items:center;justify-content:center;z-index:45}

/* toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--azul-osc);
  color:#fff;padding:12px 22px;border-radius:30px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;
  transition:.3s;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--rojo)}#toast.ok{background:var(--verde)}

.emoji-pick{display:flex;flex-wrap:wrap;gap:6px;max-height:150px;overflow-y:auto;padding:8px;background:var(--gris);border-radius:12px;border:2px solid var(--borde)}
.emoji-pick button{width:42px;height:42px;font-size:22px;background:#fff;border:2px solid var(--borde);border-radius:10px;line-height:1}
.emoji-pick button.sel{border-color:var(--azul);background:#e3f2fd;transform:scale(1.05)}
.emoji-preview{font-size:30px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border:2px solid var(--borde);border-radius:12px;background:var(--gris);flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:var(--suave)}
.empty .em{font-size:48px;margin-bottom:10px}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-bar input{flex:1;padding:11px 14px;border:2px solid var(--borde);border-radius:12px}
@media(max-width:560px){.calc-keys button{padding:16px}.stat .val{font-size:20px}}
</style>
</head>

<!-- ================= LOGIN ================= -->
<div id="login">
  <div class="login-card">
    <div class="logo-wrap" id="loginLogo">
      <img src="assets/logo.png" alt="Entre Amigos" onerror="this.onerror=null;this.src='assets/logo.svg'">
      <div class="logo-fallback" style="display:none"><span class="mono">🐵🍺</span>ENTRE<br>AMIGOS</div>
    </div>
    <h1 class="brand">ENTRE AMIGOS</h1>
    <div class="brand-sub">Cavas · EAJ</div>

      <select id="loginUser"></select>
    </div>
    <div class="field">
      <label>PIN / Clave</label>
      <input type="password" id="loginPin" inputmode="numeric" placeholder="••••" maxlength="8">

    <button class="btn btn-primary" onclick="doLogin()">Ingresar 🍺</button>
    <div class="hint" id="loginHint"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <div class="topbar">
    <div class="tlogo"><img src="assets/logo.png" onerror="this.onerror=null;this.src='assets/logo.svg'"></div>
    <div class="tinfo">
      <b>ENTRE AMIGOS</b>
      <span id="userLabel"></span>
    </div>
    <span class="rolepill" id="rolePill"></span>

  <div class="tabs" id="tabs"></div>

  <div class="container" id="view"></div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =====================================================
   ENTRE AMIGOS · Sistema de Tienda (POS + Contabilidad)
   Datos en localStorage. Single-file app.
===================================================== */
const DB_KEY='entreamigos_db_v4';
const EMOJIS=['🍺','🍻','🍾','🥃','🍷','🍸','🍹','🧉','🍶','🥂','🥤','🧃','💧','☕','🧋','🧊','🍟','🥔','🌭','🍿','🥨','🥜','🍞','🥖','🧀','🥪','🍔','🌮','🌯','🥟','🍫','🍬','🍭','🍩','🍪','🧁','🍰','🍦','🍨','🍮','🍌','🍎','🍊','🍇','🍓','🍉','🥚','🥛','🧈','🚬','🔥','🧴','🧻','🧼','🪥','🔋','💊','🩹','🧯','🪒','📦','🛒','💵','🏪'];

let DB=load();
if(!DB.cuentas)DB.cuentas=[];
function load(){try{const r=localStorage.getItem(DB_KEY);return r?JSON.parse(r):seed()}catch(e){return seed()}}

/* ---------- SUPABASE (nube) ---------- */
const SUPA_URL='https://vslaiticcxwcikapwjis.supabase.co';
const SUPA_KEY='sb_publishable_6UedTQBt2V92i_hp-G2AlQ_FY-H3PKO';
let sb=null, CLOUD=false, _saveT=null;
function stable(o){return JSON.stringify(o,(k,v)=>{if(v&&typeof v==='object'&&!Array.isArray(v)){return Object.keys(v).sort().reduce((a,key)=>{a[key]=v[key];return a},{})}return v})}
function setCloudUI(){
  const d=document.getElementById('cloudDot');if(d)d.textContent=CLOUD?'☁️':'';
  const h=document.getElementById('loginHint');if(h&&!SESSION)h.innerHTML=(CLOUD?'☁️ <b>Conectado a la nube</b> · ':'📴 Modo local · ')+'Ingresa tu PIN 🍺';
}
async function cloudInit(){
  if(!window.supabase||!SUPA_URL)return false;
  try{
    sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
    const {data,error}=await sb.from('tienda_data').select('data').eq('id',1).maybeSingle();
    if(error)throw error;
    if(data&&data.data){DB=data.data;if(!DB.cuentas)DB.cuentas=[];localStorage.setItem(DB_KEY,JSON.stringify(DB));}
    else{await sb.from('tienda_data').upsert({id:1,data:DB,updated_at:new Date().toISOString()});}
    CLOUD=true;
    sb.channel('tienda_rt').on('postgres_changes',{event:'*',schema:'public',table:'tienda_data',filter:'id=eq.1'},payload=>{
      const nd=payload.new&&payload.new.data;if(!nd)return;
      if(stable(nd)===stable(DB))return;
      DB=nd;if(!DB.cuentas)DB.cuentas=[];localStorage.setItem(DB_KEY,JSON.stringify(DB));
      onCloudUpdate();
    }).subscribe();
    setCloudUI();
    return true;
  }catch(e){console.warn('Supabase no disponible, usando modo local:',e&&e.message);CLOUD=false;setCloudUI();return false}
}
function onCloudUpdate(){
  if(document.getElementById('modalHost'))return;
  if(SESSION){if(CUR)go(CUR)}else{renderLoginUsers()}
}
function save(){
  localStorage.setItem(DB_KEY,JSON.stringify(DB));
  if(CLOUD&&sb){clearTimeout(_saveT);_saveT=setTimeout(()=>{
    sb.from('tienda_data').upsert({id:1,data:DB,updated_at:new Date().toISOString()}).then(r=>{if(r.error)console.warn('cloudSave',r.error.message)});
  },500);}
}

/* ---------- CALCS / ACCOUNTING ---------- */
function calcStats(filterVend){
  let ventasTotal=0,costoVendido=0,unidades=0,nVentas=0;
  DB.ventas.forEach(v=>{
    if(filterVend && v.vendedorId!==filterVend) return;
    ventasTotal+=v.total;nVentas++;
    v.items.forEach(it=>{ const base=(it.factor||1)*it.cantidad; costoVendido+=(it.precioCompra||0)*base; unidades+=base; });
  });
  const inversionCompras=DB.compras.reduce((s,c)=>s+c.total,0);
  const valorInventario=DB.productos.reduce((s,p)=>s+p.precioCompra*p.stock,0);
  const utilidad=ventasTotal-costoVendido;
  return {ventasTotal,costoVendido,utilidad,inversionCompras,valorInventario,unidades,nVentas};
}

function topProductos(){
  const m={};
  DB.ventas.forEach(v=>v.items.forEach(it=>{m[it.nombre]=(m[it.nombre]||0)+it.cantidad}));
  const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(!arr.length)return '<p class="muted">Aún no hay ventas registradas.</p>';
  const max=arr[0][1];
  return arr.map(([n,q])=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700"><span>${n}</span><span>${q} und</span></div>
    <div style="height:8px;background:var(--gris-2);border-radius:8px;margin-top:3px;overflow:hidden"><div style="height:100%;width:${q/max*100}%;background:linear-gradient(90deg,var(--azul-claro),var(--azul))"></div></div></div>`).join('');
}

function highlightCat(){document.querySelectorAll('#catChips .chip').forEach(c=>c.classList.toggle('active',c.textContent===POS.cat))}
function presList(p){return p.presentaciones&&p.presentaciones.length?p.presentaciones:[{nombre:'Unidad',factor:1,precioVenta:p.precioVenta||0}]}
function unitPrice(p){return presList(p)[0].precioVenta}
function renderProds(){
  const g=document.getElementById('prodGrid');if(!g)return;
  let list=DB.productos.filter(p=>POS.cat==='Todos'||p.categoria===POS.cat);
  if(POS.search.trim()){const q=POS.search.toLowerCase();list=list.filter(p=>p.nombre.toLowerCase().includes(q))}
  if(!list.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="em">🔍</div>Sin productos</div>';return}
  g.innerHTML=list.map(p=>{const pres=presList(p);const multi=pres.length>1;
    return `<div class="prod-card ${p.stock<=0?'disabled':''}" onclick="tapProd('${p.id}')">
      <span class="stock-tag">${p.stock} und</span>
      <div class="prod-emoji">${p.emoji||'📦'}</div>
      <div class="pn">${p.nombre}</div>
      <div class="pp">${money(unitPrice(p))}${multi?' +':''}</div>
      <div class="ps">${multi?'📦 '+pres.length+' presentaciones':p.categoria}</div>
    </div>`}).join('');
}
function tapProd(id){
  const p=DB.productos.find(x=>x.id===id);if(!p||p.stock<=0)return;
  const pres=presList(p);
  if(pres.length<=1){addCart(id,0);return}
  openModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:380px">
    <h3>${p.emoji||''} ${p.nombre}</h3>
    <p class="muted" style="margin-bottom:14px;font-size:13px">¿Cómo lo vendes? · Stock disponible: <b>${p.stock} und</b></p>
    ${pres.map((pr,i)=>`<button class="btn btn-amarillo" style="width:100%;justify-content:space-between;margin-bottom:8px;${pr.factor>p.stock?'opacity:.4;pointer-events:none':''}" onclick="addCart('${id}',${i});closeModal()">
       <span style="text-align:left">${pr.nombre}${pr.factor>1?` · ${pr.factor} und`:''}</span><b style="font-size:16px">${money(pr.precioVenta)}</b></button>`).join('')}
    <button class="btn btn-gris" style="width:100%;margin-top:4px" onclick="closeModal()">Cerrar</button>
  </div></div>`);
}
function baseUsed(prodId){return POS.cart.filter(c=>c.id===prodId).reduce((s,c)=>s+c.factor*c.cantidad,0)}
function addCart(id,presIdx){
  presIdx=presIdx||0;
  const p=DB.productos.find(x=>x.id===id);if(!p||p.stock<=0)return;
  const pr=presList(p)[presIdx];
  if(baseUsed(id)+pr.factor>p.stock){toast('No hay stock suficiente','err');return}
  const key=id+'|'+presIdx;
  const it=POS.cart.find(c=>c.key===key);
  if(it)it.cantidad++;
  else POS.cart.push({key,id,presIdx,nombre:p.nombre,emoji:p.emoji,presNombre:pr.nombre,factor:pr.factor,precioVenta:pr.precioVenta,precioCompra:p.precioCompra,cantidad:1});
  renderCart();toast(`+ ${p.nombre} · ${pr.nombre}`,'ok');
}
function changeQty(key,d){
  const it=POS.cart.find(c=>c.key===key);if(!it)return;
  const p=DB.productos.find(x=>x.id===it.id);
  if(d>0 && p && baseUsed(it.id)+it.factor>p.stock){toast('No hay más stock','err');return}
  it.cantidad+=d;
  if(it.cantidad<=0)POS.cart=POS.cart.filter(c=>c.key!==key);
  renderCart();
}
function removeItem(key){POS.cart=POS.cart.filter(c=>c.key!==key);renderCart()}
function cartTotal(){return POS.cart.reduce((s,i)=>s+i.precioVenta*i.cantidad,0)}
function renderCart(){
  const box=document.getElementById('cartBox');if(!box)return;
  const total=cartTotal();
  const vuelta=POS.metodo==='Efectivo'?(POS.pago-total):0;
  box.innerHTML=`
    <div class="cart-head"><span>🛒 Carrito</span><span>${POS.cart.reduce((a,i)=>a+i.cantidad,0)} und</span></div>
    <div class="cart-body">
      ${POS.cart.length?POS.cart.map(i=>`
        <div class="cart-item">
          <button class="ci-del" onclick="removeItem('${i.key}')" title="Quitar">🗑️</button>
          <div class="ci-info"><b>${i.emoji||''} ${i.nombre}</b><span>${i.presNombre} · ${money(i.precioVenta)}${i.factor>1?` (${i.factor}u)`:''}</span></div>
          <div class="qty"><button onclick="changeQty('${i.key}',-1)">−</button><span>${i.cantidad}</span><button onclick="changeQty('${i.key}',1)">+</button></div>
          <div class="ci-sub">${money(i.precioVenta*i.cantidad)}</div>
        </div>`).join(''):'<div class="cart-empty">Toca productos para agregarlos 🍺</div>'}
    </div>
    <div class="cart-foot">
      <div class="cart-total"><span>TOTAL</span><span>${money(total)}</span></div>
      ${POS.cart.length?`
      <div class="pay-method">
        <button class="${POS.metodo==='Efectivo'?'active':''}" onclick="setMetodo('Efectivo')">💵 Efectivo</button>
        <button class="${POS.metodo==='Transferencia'?'active':''}" onclick="setMetodo('Transferencia')">📲 Transfer.</button>
      </div>
      ${POS.metodo==='Efectivo'?`
      <div class="pay-box">
        <div class="quickcash">
          ${quickCashBtns(total)}
        </div>
        <div class="pay-row">
          <label>Paga con:</label>
          <input class="pay-input" id="payInput" inputmode="numeric" value="${POS.pago||''}" placeholder="0" oninput="POS.pago=parseInt(this.value.replace(/\\D/g,''))||0;renderVuelta()">
        </div>
        <div id="vueltaSlot">${vueltaHTML(total,vuelta)}</div>
      </div>`:''}
      <button class="btn btn-verde" style="width:100%;margin-bottom:8px" onclick="confirmSale()">✅ Cobrar ${money(total)}</button>
      <button class="btn btn-gris btn-sm" style="width:100%" onclick="clearCart()">Vaciar carrito</button>
      `:''}
    </div>`;
}
function quickCashBtns(total){
  const opts=[total];
  [1000,2000,5000,10000,20000,50000].forEach(b=>{if(b>total)opts.push(b)});
  // redondeos arriba
  const r5=Math.ceil(total/5000)*5000, r10=Math.ceil(total/10000)*10000;
  [r5,r10].forEach(x=>{if(x>total&&!opts.includes(x))opts.push(x)});
  const uniq=[...new Set(opts)].sort((a,b)=>a-b).slice(0,6);
  return uniq.map(v=>`<button onclick="POS.pago=${v};renderCart();setTimeout(()=>{const e=document.getElementById('payInput');},0)">${v===total?'Exacto':money(v)}</button>`).join('');
}
function vueltaHTML(total,vuelta){
  if(!POS.pago)return '<div class="vuelta-box" style="background:var(--gris-2);color:var(--suave)">Ingresa con cuánto paga</div>';
  if(vuelta<0)return `<div class="vuelta-box falta">FALTAN<span class="big">${money(-vuelta)}</span></div>`;
  return `<div class="vuelta-box ok">VUELTAS / DEVOLVER<span class="big">${money(vuelta)}</span></div>`;
}
function renderVuelta(){const slot=document.getElementById('vueltaSlot');if(slot)slot.innerHTML=vueltaHTML(cartTotal(),POS.pago-cartTotal())}
function setMetodo(m){POS.metodo=m;if(m!=='Efectivo')POS.pago=0;renderCart()}
function clearCart(){POS.cart=[];POS.pago=0;renderCart()}
function confirmSale(){
  if(!POS.cart.length){toast('Carrito vacío','err');return}
  const total=cartTotal();
  if(POS.metodo==='Efectivo' && POS.pago && POS.pago<total){toast('El pago no cubre el total','err');return}
  const vuelta=POS.metodo==='Efectivo'?Math.max(0,(POS.pago||total)-total):0;
  // descontar stock (unidades reales = factor × cantidad)
  for(const it of POS.cart){const p=DB.productos.find(x=>x.id===it.id);if(p)p.stock-=it.factor*it.cantidad}
  const venta={
    id:uid(),fecha:now(),vendedorId:SESSION.id,vendedor:SESSION.nombre,
    items:POS.cart.map(i=>({id:i.id,nombre:i.nombre,presNombre:i.presNombre,factor:i.factor,cantidad:i.cantidad,precioVenta:i.precioVenta,precioCompra:i.precioCompra})),
    total,metodo:POS.metodo,pago:POS.metodo==='Efectivo'?(POS.pago||total):total,vuelta
  };
  DB.ventas.push(venta);save();
  showTicket(venta);
  POS.cart=[];POS.pago=0;
  renderProds();renderCart();
}
function showTicket(v){
  const html=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:340px;text-align:center">
      <div style="font-size:40px">🐵🍺</div>
      <h3 style="text-align:center;margin-bottom:4px">¡Venta registrada!</h3>
      <p class="muted" style="margin-bottom:14px;font-size:12px">${fmtDate(v.fecha)} · ${v.vendedor}</p>
      <table style="text-align:left"><tbody>
        ${v.items.map(i=>`<tr><td>${i.cantidad}× ${i.nombre}${i.factor>1?` <span class="muted">·${i.presNombre}</span>`:''}</td><td class="ta-r">${money(i.precioVenta*i.cantidad)}</td></tr>`).join('')}
        <tr><td style="font-weight:900;border-top:2px solid var(--borde)">TOTAL</td><td class="ta-r" style="font-weight:900;border-top:2px solid var(--borde);color:var(--verde)">${money(v.total)}</td></tr>
        ${v.metodo==='Efectivo'?`<tr><td>Pagó con</td><td class="ta-r">${money(v.pago)}</td></tr>
        <tr><td style="font-weight:900;color:var(--rojo)">VUELTAS</td><td class="ta-r" style="font-weight:900;color:var(--rojo)">${money(v.vuelta)}</td></tr>`:`<tr><td colspan="2" class="ta-c"><span class="badge cat">📲 Transferencia</span></td></tr>`}
      </tbody></table>
      <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="closeModal()">Nueva venta 🛒</button>
    </div>
  </div>`;
  openModal(html);
}

        <input id="mesaSearch" placeholder="🔍 Buscar producto..." style="width:100%;padding:12px 14px;border:2px solid var(--borde);border-radius:12px;margin-bottom:10px" value="${MESA.search}" oninput="MESA.search=this.value;renderMesaProds('${id}')">
        <div class="cat-chips" id="mesaCats">${cats.map(cat=>`<button class="chip ${MESA.cat===cat?'active':''}" onclick="MESA.cat='${cat}';renderMesaProds('${id}')">${cat}</button>`).join('')}</div>
        <div class="prod-grid" id="mesaGrid"></div>
      </div>
      <div class="cart" id="mesaCart"></div>
    </div>`;

}
function renderMesaProds(id){
  const g=document.getElementById('mesaGrid');if(!g)return;
  document.querySelectorAll('#mesaCats .chip').forEach(c=>c.classList.toggle('active',c.textContent===MESA.cat));
  let list=DB.productos.filter(p=>MESA.cat==='Todos'||p.categoria===MESA.cat);
  if(MESA.search.trim()){const q=MESA.search.toLowerCase();list=list.filter(p=>p.nombre.toLowerCase().includes(q))}
  g.innerHTML=list.map(p=>{const multi=presList(p).length>1;
    return `<div class="prod-card ${p.stock<=0?'disabled':''}" onclick="mesaTap('${id}','${p.id}')">
      <span class="stock-tag">${p.stock} und</span><div class="prod-emoji">${p.emoji||'📦'}</div>
      <div class="pn">${p.nombre}</div><div class="pp">${money(unitPrice(p))}${multi?' +':''}</div>
      <div class="ps">${multi?'elige presentación':p.categoria}</div></div>`}).join('');
}
function mesaTap(cid,pid){
  const p=DB.productos.find(x=>x.id===pid);if(!p||p.stock<=0)return;const pres=presList(p);
  if(pres.length<=1){mesaAdd(cid,pid,0);return}
  openModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:360px">
    <h3>${p.emoji||''} ${p.nombre}</h3><p class="muted" style="margin-bottom:14px;font-size:13px">Stock: ${p.stock} und</p>
    ${pres.map((pr,i)=>`<button class="btn btn-amarillo" style="width:100%;justify-content:space-between;margin-bottom:8px;${pr.factor>p.stock?'opacity:.4;pointer-events:none':''}" onclick="mesaAdd('${cid}','${pid}',${i});closeModal()"><span style="text-align:left">${pr.nombre}${pr.factor>1?` · ${pr.factor} und`:''}</span><b>${money(pr.precioVenta)}</b></button>`).join('')}
    <button class="btn btn-gris" style="width:100%" onclick="closeModal()">Cerrar</button></div></div>`);
}
function mesaBaseUsed(c,pid){return c.items.filter(i=>i.id===pid).reduce((s,i)=>s+i.factor*i.cantidad,0)}
function mesaAdd(cid,pid,idx){
  const c=DB.cuentas.find(x=>x.id===cid);const p=DB.productos.find(x=>x.id===pid);const pr=presList(p)[idx];
  if(mesaBaseUsed(c,pid)+pr.factor>p.stock){toast('No hay stock suficiente','err');return}
  const key=pid+'|'+idx;const it=c.items.find(i=>i.key===key);
  if(it)it.cantidad++;else c.items.push({key,id:pid,nombre:p.nombre,emoji:p.emoji,presNombre:pr.nombre,factor:pr.factor,precioVenta:pr.precioVenta,precioCompra:p.precioCompra,cantidad:1});
  save();renderMesaCart(cid);toast('+ '+p.nombre,'ok');
}
function mesaQty(cid,key,d){
  const c=DB.cuentas.find(x=>x.id===cid);const it=c.items.find(i=>i.key===key);if(!it)return;
  const p=DB.productos.find(x=>x.id===it.id);
  if(d>0&&p&&mesaBaseUsed(c,it.id)+it.factor>p.stock){toast('No hay más stock','err');return}
  it.cantidad+=d;if(it.cantidad<=0)c.items=c.items.filter(i=>i.key!==key);save();renderMesaCart(cid);
}
function mesaRemove(cid,key){const c=DB.cuentas.find(x=>x.id===cid);c.items=c.items.filter(i=>i.key!==key);save();renderMesaCart(cid)}
function cuentaTotal(c){return c.items.reduce((s,i)=>s+i.precioVenta*i.cantidad,0)}
function renderMesaCart(id){
  const box=document.getElementById('mesaCart');if(!box)return;
  const c=DB.cuentas.find(x=>x.id===id);const total=cuentaTotal(c);
  box.innerHTML=`
    <div class="cart-head"><span>🧾 Cuenta</span><span>${money(total)}</span></div>
    <div class="cart-body">
      ${c.items.length?c.items.map(i=>`<div class="cart-item">
        <button class="ci-del" onclick="mesaRemove('${id}','${i.key}')" title="Quitar">🗑️</button>
        <div class="ci-info"><b>${i.emoji||''} ${i.nombre}</b><span>${i.presNombre} · ${money(i.precioVenta)}</span></div>
        <div class="qty"><button onclick="mesaQty('${id}','${i.key}',-1)">−</button><span>${i.cantidad}</span><button onclick="mesaQty('${id}','${i.key}',1)">+</button></div>
        <div class="ci-sub">${money(i.precioVenta*i.cantidad)}</div></div>`).join(''):'<div class="cart-empty">Agrega lo que vayan pidiendo 🍺</div>'}
    </div>
    <div class="cart-foot">
      <div class="cart-total"><span>PARCIAL</span><span>${money(total)}</span></div>
      ${c.tel?`<button class="btn btn-verde" style="width:100%;margin-bottom:8px" onclick="enviarCuentaWA('${id}',false)">📲 Enviar avance al cliente</button>`:'<p class="muted" style="font-size:11px;text-align:center;margin-bottom:8px">Agrega un celular a la cuenta para enviar por WhatsApp</p>'}
      <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="cerrarCuentaModal('${id}')">✅ Cerrar y cobrar</button>
      <button class="btn btn-rojo btn-sm" style="width:100%" onclick="anularCuenta('${id}')">Anular cuenta</button>
    </div>`;
}
function cuentaTexto(c,final,pago,vuelta,metodo){
  let t=`🍺 *ENTRE AMIGOS* 🐵\n`;
  const enc=(c.mesa?`🪑 ${c.mesa}`:'')+(c.cliente?(c.mesa?' · ':'')+c.cliente:'');
  if(enc)t+=enc+`\n`;
  t+=`\n`;
  c.items.forEach(i=>{t+=`• ${i.cantidad}× ${i.nombre}${i.factor>1?` (${i.presNombre})`:''} — ${money(i.precioVenta*i.cantidad)}\n`});
  t+=`\n${final?'✅ *TOTAL A PAGAR:*':'🧾 *Parcial hasta ahora:*'} ${money(cuentaTotal(c))}`;
  if(final){
    t+=`\n${metodo==='Transferencia'?'📲':'💵'} Pago: *${metodo||'Efectivo'}*`;
    if((metodo||'Efectivo')==='Efectivo'&&pago){t+=`\nPagó con: ${money(pago)}\n🔁 Vueltas: ${money(vuelta)}`}
  }
  t+=`\n\n📞 312 777 4605`;
  return t;
}
function waUrl(tel,text){let u='https://wa.me/';if(tel){let t=String(tel).replace(/\D/g,'');if(t.length===10)t='57'+t;u+=t}return u+'?text='+encodeURIComponent(text)}
function enviarCuentaWA(id,final,pago,vuelta){
  const c=DB.cuentas.find(x=>x.id===id);if(!c){return}
  window.open(waUrl(c.tel,cuentaTexto(c,final,pago,vuelta)),'_blank');
}
let CM_METODO='Efectivo';
function cerrarCuentaModal(id){
  const c=DB.cuentas.find(x=>x.id===id);const total=cuentaTotal(c);
  if(!c.items.length){toast('La cuenta está vacía','err');return}
  CM_METODO='Efectivo';
  openModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>✅ Cerrar cuenta ${c.mesa?'· '+c.mesa:''}</h3>
    <div class="cart-total" style="font-size:24px;padding:0 4px"><span>TOTAL</span><span>${money(total)}</span></div>
    <div class="pay-method" style="margin-top:10px">
      <button id="cm_ef" class="active" onclick="cmMet('Efectivo')">💵 Efectivo</button>
      <button id="cm_tr" onclick="cmMet('Transferencia')">📲 Transfer.</button>
    </div>
    <div id="cm_efbox">
      <div class="field"><label>Paga con</label><input id="cm_pago" inputmode="numeric" placeholder="0" oninput="cmVuelta(${total})"></div>
      <div id="cm_vres" class="vuelta-box" style="background:var(--gris-2);color:var(--suave)">Vueltas: $0</div>
    </div>
    <div class="modal-actions"><button class="btn btn-gris" onclick="closeModal()">Cancelar</button><button class="btn btn-verde" onclick="cerrarCuenta('${id}')">Cobrar y cerrar</button></div>
  </div></div>`);
}
function cmMet(m){CM_METODO=m;document.getElementById('cm_ef').classList.toggle('active',m==='Efectivo');document.getElementById('cm_tr').classList.toggle('active',m==='Transferencia');document.getElementById('cm_efbox').style.display=m==='Efectivo'?'block':'none'}
function cmVuelta(total){const p=parseInt(document.getElementById('cm_pago').value)||0;const r=document.getElementById('cm_vres');const v=p-total;
  if(!p){r.className='vuelta-box';r.style.background='var(--gris-2)';r.style.color='var(--suave)';r.textContent='Vueltas: $0';return}
  if(v<0){r.className='vuelta-box falta';r.style='';r.innerHTML=`FALTAN <b>${money(-v)}</b>`}else{r.className='vuelta-box ok';r.style='';r.innerHTML=`VUELTAS <b>${money(v)}</b>`}}
function cerrarCuenta(id){
  const c=DB.cuentas.find(x=>x.id===id);const total=cuentaTotal(c);
  let pago=total,vuelta=0;
  if(CM_METODO==='Efectivo'){pago=parseInt(document.getElementById('cm_pago').value)||total;if(pago<total){toast('El pago no cubre el total','err');return}vuelta=pago-total}
  for(const it of c.items){const p=DB.productos.find(x=>x.id===it.id);if(p)p.stock-=it.factor*it.cantidad}
  DB.ventas.push({id:uid(),fecha:now(),vendedorId:c.vendedorId||SESSION.id,vendedor:c.vendedor||SESSION.nombre,
    items:c.items.map(i=>({id:i.id,nombre:i.nombre,presNombre:i.presNombre,factor:i.factor,cantidad:i.cantidad,precioVenta:i.precioVenta,precioCompra:i.precioCompra})),
    total,metodo:CM_METODO,pago,vuelta,mesa:c.mesa,cliente:c.cliente});
  const enviar=!!c.tel;const textoFinal=cuentaTexto(c,true,pago,vuelta,CM_METODO),tel=c.tel;
  DB.cuentas=DB.cuentas.filter(x=>x.id!==id);save();closeModal();
  if(enviar)window.open(waUrl(tel,textoFinal),'_blank');
  showCierreTicket(c,total,pago,vuelta,CM_METODO);
  toast('Cuenta cerrada y cobrada ✅','ok');
}
function showCierreTicket(c,total,pago,vuelta,metodo){
  const ef=(metodo||'Efectivo')==='Efectivo';
  openModal(`<div class="modal-bg" onclick="if(event.target===this){closeModal();go('mesas')}"><div class="modal" style="max-width:340px;text-align:center">
    <div style="font-size:40px">✅</div>
    <h3 style="text-align:center;margin-bottom:4px">Cuenta cobrada</h3>
    <p class="muted" style="font-size:12px;margin-bottom:14px">🪑 ${c.mesa||'Cuenta'}${c.cliente?' · '+c.cliente:''}</p>
    <table style="text-align:left"><tbody>
      ${c.items.map(i=>`<tr><td>${i.cantidad}× ${i.nombre}${i.factor>1?` <span class="muted">·${i.presNombre}</span>`:''}</td><td class="ta-r">${money(i.precioVenta*i.cantidad)}</td></tr>`).join('')}
      <tr><td style="font-weight:900;border-top:2px solid var(--borde)">TOTAL</td><td class="ta-r" style="font-weight:900;border-top:2px solid var(--borde);color:var(--verde)">${money(total)}</td></tr>
      <tr><td>Método de pago</td><td class="ta-r"><span class="badge ${ef?'ok':'cat'}">${ef?'💵 Efectivo':'📲 Transferencia'}</span></td></tr>
      ${ef?`<tr><td>Pagó con</td><td class="ta-r">${money(pago)}</td></tr>
      <tr><td style="font-weight:900;color:var(--rojo)">VUELTAS</td><td class="ta-r" style="font-weight:900;color:var(--rojo)">${money(vuelta)}</td></tr>`:''}
    </tbody></table>
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="closeModal();go('mesas')">Listo 🪑</button>
  </div></div>`);
}
function anularCuenta(id){confirmBox('¿Anular esta cuenta? No se cobra ni descuenta stock.',()=>{DB.cuentas=DB.cuentas.filter(x=>x.id!==id);save();toast('Cuenta anulada','ok');go('mesas')})}

let PRES_EDIT=[];

function renderEmojiPick(cur){

function pickEmoji(e){

function markEmoji(e){document.querySelectorAll('#emojiPick button').forEach(b=>b.classList.toggle('sel',b.textContent===e))}
function renderPres(){

      <input style="flex:1.5;min-width:0;padding:9px;border:2px solid var(--borde);border-radius:9px;text-align:right" inputmode="numeric" placeholder="Precio" value="${pr.precioVenta||''}" oninput="PRES_EDIT[${i}].precioVenta=parseInt(this.value)||0">
      ${PRES_EDIT.length>1?`<button class="btn btn-rojo btn-sm" onclick="delPres(${i})">✕</button>`:'<span style="width:34px"></span>'}

function addPres(){PRES_EDIT.push({nombre:'',factor:1,precioVenta:''});renderPres()}
function delPres(i){PRES_EDIT.splice(i,1);renderPres()}
function saveProd(id){
  const g=x=>document.getElementById(x).value;
  const nombre=g('m_nombre').trim();
  if(!nombre){toast('Pon un nombre','err');return}
  const pres=PRES_EDIT.filter(p=>(p.nombre||'').trim()&&p.precioVenta).map(p=>({nombre:p.nombre.trim(),factor:parseInt(p.factor)||1,precioVenta:parseInt(p.precioVenta)||0}));
  if(!pres.length){toast('Agrega al menos una presentación con precio','err');return}

  if(id){const ex=DB.productos.find(x=>x.id===id);delete ex.precioVenta;Object.assign(ex,data)}
  else DB.productos.push({id:uid(),...data});

}
function delProd(id){
  const p=DB.productos.find(x=>x.id===id);
  confirmBox(`¿Eliminar "${p.nombre}"?`,()=>{DB.productos=DB.productos.filter(x=>x.id!==id);save();renderInv();toast('Eliminado','ok')});
}

    <div class="field"><label>Producto</label><select id="c_prod" onchange="syncCosto()">${DB.productos.map(p=>`<option value="${p.id}" data-c="${p.precioCompra}">${p.nombre} (stock ${p.stock})</option>`).join('')}</select></div>

function saveCompra(){
  const id=document.getElementById('c_prod').value;

  const costo=parseInt(document.getElementById('c_costo').value)||0;
  if(cant<=0){toast('Cantidad inválida','err');return}
  const p=DB.productos.find(x=>x.id===id);
  p.stock+=cant;
  if(document.getElementById('c_upd').checked)p.precioCompra=costo;
  DB.compras.push({id:uid(),fecha:now(),prodId:id,nombre:p.nombre,cantidad:cant,costoUnit:costo,total:cant*costo});

let QCALC={items:[],pago:0,cat:'Todos'};

        <div class="calc-keys">
          <button class="clr" onclick="calcC()">C</button>
          <button onclick="calcDel()">⌫</button>
          <button onclick="calcPct()">%</button>
          <button class="op" onclick="calcOp('/')">÷</button>
          <button onclick="calcNum('7')">7</button><button onclick="calcNum('8')">8</button><button onclick="calcNum('9')">9</button><button class="op" onclick="calcOp('*')">×</button>
          <button onclick="calcNum('4')">4</button><button onclick="calcNum('5')">5</button><button onclick="calcNum('6')">6</button><button class="op" onclick="calcOp('-')">−</button>
          <button onclick="calcNum('1')">1</button><button onclick="calcNum('2')">2</button><button onclick="calcNum('3')">3</button><button class="op" onclick="calcOp('+')">+</button>
          <button class="span2" onclick="calcNum('0')">0</button><button onclick="calcNum('.')">.</button><button class="eq" onclick="calcEq()">=</button>
        </div>
      </div>
    </div>`;
  renderQuick();updCalc();
}

function renderQuick(){
  const g=document.getElementById('qcGrid');if(!g)return;
  document.querySelectorAll('#qcCats .chip').forEach(c=>c.classList.toggle('active',c.textContent===QCALC.cat));
  const list=DB.productos.filter(p=>QCALC.cat==='Todos'||p.categoria===QCALC.cat);

function qcTap(id){
  const p=DB.productos.find(x=>x.id===id);const pres=presList(p);
  if(pres.length<=1){qcAdd(id,0);return}
  openModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:360px">
    <h3>${p.emoji||''} ${p.nombre}</h3>

function qcRemove(idx){QCALC.items.splice(idx,1);renderQcTicket()}
function qcClear(){QCALC.items=[];QCALC.pago=0;renderQcTicket()}
function qcTotal(){return QCALC.items.reduce((s,i)=>s+i.precio,0)}

  const el=document.getElementById('qcTicket');if(!el)return;
  const total=qcTotal();const v=QCALC.pago-total;
  el.innerHTML=`
   ${QCALC.items.length?`<div style="border:2px solid var(--borde);border-radius:12px;overflow:hidden;margin-bottom:10px">

   <div class="cart-total" style="font-size:22px;padding:0 4px"><span>TOTAL</span><span>${money(total)}</span></div>
   ${QCALC.items.length?`<div class="pay-box" style="margin-top:8px">
     <div class="pay-row"><label>Paga con:</label><input class="pay-input" inputmode="numeric" value="${QCALC.pago||''}" placeholder="0" oninput="QCALC.pago=parseInt(this.value.replace(/\\D/g,''))||0;renderQcVuelta()"></div>
     <div id="qcVuelta">${qcVueltaHTML(total,v)}</div>
   </div>
   <button class="btn btn-rojo btn-sm" style="width:100%" onclick="qcClear()">🧹 Limpiar todo</button>`:''}`;
}
function qcVueltaHTML(total,v){
  if(!QCALC.pago)return '<div class="vuelta-box" style="background:var(--gris-2);color:var(--suave)">Escribe con cuánto paga el cliente</div>';
  if(v<0)return `<div class="vuelta-box falta">FALTAN<span class="big">${money(-v)}</span></div>`;
  return `<div class="vuelta-box ok">VUELTAS / DEVOLVER<span class="big">${money(v)}</span></div>`;
}
function renderQcVuelta(){const s=document.getElementById('qcVuelta');if(s)s.innerHTML=qcVueltaHTML(qcTotal(),QCALC.pago-qcTotal())}
function updCalc(){const c=document.getElementById('calcCur'),p=document.getElementById('calcPrev');
  if(c)c.textContent=CALC.cur;if(p)p.textContent=CALC.prev?`${fmtNum(CALC.prev)} ${opSym(CALC.op)}`:''}
function fmtNum(n){const x=parseFloat(n);return isNaN(x)?n:x.toLocaleString('es-CO',{maximumFractionDigits:6})}
function opSym(o){return{'+':'+','-':'−','*':'×','/':'÷'}[o]||''}
function calcNum(d){if(CALC.reset){CALC.cur='0';CALC.reset=false}
  if(d==='.'&&CALC.cur.includes('.'))return;
  CALC.cur=CALC.cur==='0'&&d!=='.'?d:CALC.cur+d;updCalc()}
function calcOp(o){if(CALC.op&&!CALC.reset)calcEq();CALC.prev=CALC.cur;CALC.op=o;CALC.reset=true;updCalc()}
function calcEq(){if(!CALC.op)return;const a=parseFloat(CALC.prev),b=parseFloat(CALC.cur);
  let r=0;if(CALC.op==='+')r=a+b;if(CALC.op==='-')r=a-b;if(CALC.op==='*')r=a*b;if(CALC.op==='/')r=b?a/b:0;
  CALC.cur=String(Math.round(r*1e6)/1e6);CALC.prev='';CALC.op=null;CALC.reset=true;updCalc()}
function calcC(){CALC={cur:'0',prev:'',op:null,reset:false};updCalc()}
function calcDel(){CALC.cur=CALC.cur.length>1?CALC.cur.slice(0,-1):'0';updCalc()}
function calcPct(){CALC.cur=String(parseFloat(CALC.cur)/100);updCalc()}

function roundRect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath()}
async function buildFlyer(){
  const W=1080,H=1350,c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#1e88e5');g.addColorStop(1,'#0d47a1');x.fillStyle=g;x.fillRect(0,0,W,H);
  let img;try{img=await loadImg('assets/logo.png')}catch(e){try{img=await loadImg('assets/logo.svg')}catch(_){img=null}}
  if(img){const s=600;x.drawImage(img,(W-s)/2,55,s,s)}
  x.textAlign='center';
  x.fillStyle='#ffd400';x.font='900 96px Arial';x.lineWidth=8;x.strokeStyle='#0a2a52';x.strokeText('ENTRE AMIGOS',W/2,760);x.fillText('ENTRE AMIGOS',W/2,760);
  x.fillStyle='#fff';x.font='bold 48px Arial';x.fillText('CAVAS · EAJ',W/2,820);
  x.fillStyle='rgba(255,255,255,.13)';roundRect(x,130,865,W-260,330,28);x.fill();
  x.fillStyle='#fff';x.font='44px Arial';x.textAlign='left';
  ['🍺  Cervezas bien frías','🍟  Papas y mecato','🍫  Dulces y golosinas','🥤  Gaseosas y agua','🚬  Cigarrillos'].forEach((t,i)=>x.fillText(t,185,940+i*58));
  x.textAlign='center';x.fillStyle='#ffd400';x.font='900 78px Arial';x.fillText('📞 312 777 4605',W/2,1290);
  return c;
}
function canvasBlob(c){return new Promise(res=>c.toBlob(res,'image/png',.95))}
async function downloadFlyer(){
  toast('Generando flyer...');
  try{const c=await buildFlyer();const b=await canvasBlob(c);dl2(b,'flyer_entre_amigos.png');toast('Flyer descargado','ok')}
  catch(e){toast('No se pudo generar el flyer','err')}
}
async function shareFlyer(){
  toast('Preparando imagen...');
  try{
    const c=await buildFlyer();const b=await canvasBlob(c);
    const file=new File([b],'entre_amigos.png',{type:'image/png'});
    const text=document.getElementById('waMsg').value;
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],text,title:'Entre Amigos'});
    }else{
      dl2(b,'flyer_entre_amigos.png');
      window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
      toast('Flyer descargado: adjúntalo en el chat de WhatsApp','ok');
    }
  }catch(e){toast('Compartir cancelado','err')}
}
function dl2(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000)}

/* =====================================================
   UTILIDADES: modal, toast, export, backup
===================================================== */
function openModal(html){const d=document.createElement('div');d.id='modalHost';d.innerHTML=html;document.body.appendChild(d)}
function closeModal(){const m=document.getElementById('modalHost');if(m)m.remove()}
function confirmBox(msg,onYes){
  openModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:36px;margin-bottom:8px">⚠️</div>
    <h3 style="text-align:center">${msg}</h3>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-gris" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-rojo" id="cfYes">Sí, continuar</button>
    </div></div></div>`);
  document.getElementById('cfYes').onclick=()=>{closeModal();onYes()};
}
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+(type||'');
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='',2200)}

function exportCSV(){
  let rows=[['Fecha','Vendedor','Producto','Cantidad','PrecioVenta','Subtotal','Metodo','Total venta','Pago','Vuelta']];
  DB.ventas.forEach(v=>v.items.forEach(i=>{
    rows.push([fmtDate(v.fecha),v.vendedor,i.nombre,i.cantidad,i.precioVenta,i.precioVenta*i.cantidad,v.metodo,v.total,v.pago,v.vuelta]);
  }));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  dl(csv,'ventas_entre_amigos.csv','text/csv');toast('CSV exportado','ok');
}
function backupJSON(){dl(JSON.stringify(DB,null,2),'respaldo_entre_amigos.json','application/json');toast('Respaldo descargado','ok')}
function dl(content,name,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click()}
function resetDemo(){confirmBox('¿Borrar TODOS los datos y volver al demo?',()=>{localStorage.removeItem(DB_KEY);DB=seed();save();toast('Datos reiniciados','ok');go('panel')})}
